# Запуск: скопируйте .env.example → .env, задайте SB_SECRET, затем:
#   docker compose up -d --build
# Данные приложения (проекты, пользователи) в именованном томе `app_data`.
# Portainer (Git → GitHub): см. docs/portainer-git.md — Basic auth для PAT, таймауты прокси.

name: schedule-builder

services:
  app:
    build:
      context: .
      # Вся сборка в сети хоста: иначе apk/npm на bridge + AAAA; RUN --network=host на этом демоне может быть запрещён.
      network: host
    # Рантайм: без зависаний на AAAA, когда у bridge нет рабочего IPv6.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    ports:
      - "3000:3000"
    environment:
      # Задайте в файле `.env` рядом с compose (см. .env.example). Без значения контейнер поднимется с запасным секретом из кода — только для пробы.
      SB_SECRET: ${SB_SECRET:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
    volumes:
      - app_data:/app/data

volumes:
  app_data:
