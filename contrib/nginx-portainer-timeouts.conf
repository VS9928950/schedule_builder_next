# Подключите в server { ... } для location, который проксирует на Portainer (9443/9000).
# Иначе длинный git clone при «Deploy stack from Git» обрывается по таймауту прокси
# (ошибки вида TLS handshake timeout / context deadline exceeded), хотя curl с сервера к GitHub работает.

proxy_http_version 1.1;
proxy_connect_timeout 900s;
proxy_send_timeout    900s;
proxy_read_timeout    900s;
send_timeout          900s;

proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
# Для WebSocket Portainer:
proxy_set_header Upgrade           $http_upgrade;
proxy_set_header Connection        $connection_upgrade;
